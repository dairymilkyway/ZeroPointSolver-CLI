name: Auto PR dev → main

on:
  push:
    branches: [dev]

jobs:
  check-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          failed=0
          for f in $(find . -name "*.py" -not -path "./.github/*"); do
            python -m py_compile "$f" || { echo "Syntax error in $f"; failed=1; }
          done
          if [ "$failed" = "1" ]; then exit 1; fi
          echo "All Python files pass syntax check"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Auto PR: dev → main ($(date +'%Y-%m-%d'))"
          BODY="Automated PR created on push to \`dev\`.

          Changes:
          $(git log --oneline origin/main..origin/dev --no-merges 2>/dev/null | head -20 || echo "(no linear history available)")"

          EXISTING=$(gh pr list --head dev --base main --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open PR from dev → main already exists — updating instead."
            PR_NUM=$(gh pr list --head dev --base main --state open --json number --jq '.[0].number')
            gh pr edit "$PR_NUM" --title "$TITLE" --body "$BODY"
          else
            gh pr create --base main --head dev --title "$TITLE" --body "$BODY"
          fi
